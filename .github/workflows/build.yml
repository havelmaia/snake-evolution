name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: SnakeEvolution-Linux
          - os: windows-latest
            artifact: SnakeEvolution-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pygame>=2.5.0 pyinstaller

      - name: Build executable
        run: pyinstaller snake.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/SnakeEvolution*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: SnakeEvolution-Linux
          path: linux/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SnakeEvolution-Windows
          path: windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/SnakeEvolution*
            windows/SnakeEvolution*
          generate_release_notes: true
